<script>
const MAX_PLAYERS = 100;
const SOCIAL = {
  instagram: 'https://www.instagram.com/shinsekai_no__kami',
  tiktok: 'https://www.tiktok.com/@shinsekai_no_kami',
  whatsappGroup: 'https://chat.whatsapp.com/GrD1ASN2NC1Dhi9ew6iKjk?s=sh&p=a&mlu='
};
/* ---------- Invitation au groupe WhatsApp (intelligente) ----------
   - "J'y suis déjà" -> on ne redemande JAMAIS.
   - "Non merci" -> on repropose de temps en temps (apres un delai).
   - "Rejoindre" -> on ouvre le groupe et on arrete de demander. */
function waInviteStatus(){ try{ return localStorage.getItem('snk_wa')||''; }catch{ return ''; } }
function waSnoozeUntil(){ try{ return parseInt(localStorage.getItem('snk_wa_snooze')||'0'); }catch{ return 0; } }
function maybeShowWhatsappInvite(){
  const st = waInviteStatus();
  if(st==='member' || st==='joined') return;          // deja membre -> jamais
  if(Date.now() < waSnoozeUntil()) return;             // en pause (refus recent)
  if(document.getElementById('waInvite')) return;
  const g=document.createElement('div'); g.id='waInvite'; g.className='wa-invite';
  g.innerHTML=`<div class="wa-card">
    <div class="wa-emoji">🦊💬</div>
    <h3>Rejoins la communauté Shinsekai no Kami !</h3>
    <p>Défis exclusifs, annonces des championnats, fun entre otakus et nouveaux quiz en avant-première… <b>la vraie aventure se vit dans le groupe WhatsApp !</b> 🔥</p>
    <a class="btn gold" href="${SOCIAL.whatsappGroup}" target="_blank" rel="noopener" onclick="waInviteAction('joined')">🟢 Rejoindre le groupe</a>
    <button class="btn alt" onclick="waInviteAction('member')">✅ J'y suis déjà</button>
    <button class="wa-later" onclick="waInviteAction('later')">Plus tard / Non merci</button>
  </div>`;
  document.body.appendChild(g);
}
function waInviteAction(action){
  try{
    if(action==='member'||action==='joined') localStorage.setItem('snk_wa', action);
    if(action==='later'){ localStorage.setItem('snk_wa_snooze', String(Date.now() + 3*24*3600*1000)); } // re-proposer dans 3 jours
  }catch{}
  const g=document.getElementById('waInvite'); if(g) g.remove();
}
function socialFollowHtml(){
  return `<div class="social-follow">
    <p class="social-title">✨ Suivez Shisnekai no Kami !</p>
    <div class="social-btns">
      <a class="social-btn wa" href="${SOCIAL.whatsappGroup}" target="_blank" rel="noopener" onclick="waInviteAction('joined')">💬 Groupe WhatsApp</a>
      <a class="social-btn ig" href="${SOCIAL.instagram}" target="_blank" rel="noopener">📸 Instagram</a>
      <a class="social-btn tt" href="${SOCIAL.tiktok}" target="_blank" rel="noopener">🎵 TikTok</a>
    </div>
  </div>`;
}
/* Suivi de visite (anonyme, 1 id par navigateur) */
(function trackVisit(){
  try{
    let vid = localStorage.getItem('snk_vid');
    if(!vid){ vid = 'v-'+Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('snk_vid', vid); }
    fetch('/api/visit', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({vid}) }).catch(()=>{});
  }catch(e){}
})();
let TOKEN = localStorage.getItem('snk_token') || sessionStorage.getItem('snk_token') || null;
let ME = null;
let MASCOTS = [];
const $ = s => document.querySelector(s);
const screen = $('#screen');
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---------- Mascottes ---------- */
async function loadMascots(){ try{ const r=await fetch('/api/mascots'); MASCOTS=(await r.json()).mascots; }catch{ MASCOTS=[]; } }
function mascotHtml(id, size){ const m=MASCOTS.find(x=>x.id===id)||{emoji:'🦊',c1:'#444',c2:'#111'};
  return `<span class="mascot ${size||'s'}" style="--m1:${m.c1};--m2:${m.c2}"><span class="em">${m.emoji}</span></span>`; }

/* ---------- Media (image/audio) dans le jeu ---------- */
function mediaHtml(q, opts){
  opts = opts||{};
  let h='';
  if(q.image) h += `<div class="game-media"><img src="${q.image}" class="game-img" alt="média de la question"/></div>`;
  if(q.audio) h += `<div class="game-media"><audio id="qaudio" src="${q.audio}" controls ${opts.autoplay?'autoplay':''} preload="auto" class="game-audio"></audio>
    <div><button class="btn alt small" onclick="replayAudio()">🔊 Rejouer le son</button></div></div>`;
  return h;
}
function replayAudio(){ const a=document.getElementById('qaudio'); if(a){ a.currentTime=0; a.play().catch(()=>{}); } }

/* ---------- Agent IA : bulle + voix (cote hote) ---------- */
let voiceOn=true, aiTimer=null;
function aiShow(text){
  const a=$('#aiAgent'), b=$('#aiBubble'); if(!a||!b||!text) return;
  $('#aiToggle').style.display='block';
  b.textContent=text; a.classList.add('show');
  clearTimeout(aiTimer); aiTimer=setTimeout(()=>a.classList.remove('show'), 7000);
  speak(text);
}
function speak(text){
  if(!voiceOn || !('speechSynthesis' in window)) return;
  try{ speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text.replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{2B00}-\u{2BFF}]/gu,''));
    u.lang='fr-FR'; u.rate=1.05; u.pitch=1.05;
    const v=speechSynthesis.getVoices().find(v=>/fr/i.test(v.lang)); if(v) u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}
function toggleVoice(){ voiceOn=!voiceOn; $('#aiToggle').textContent=voiceOn?'🔊 Voix : ON':'🔇 Voix : OFF'; if(!voiceOn&&'speechSynthesis'in window) speechSynthesis.cancel(); }

/* ---------- Son (Web Audio) ---------- */
function refreshSoundBtn(){ const b=$('#soundToggle'); if(b&&window.SNKSound){ b.style.display='block'; b.textContent=SNKSound.isEnabled()?'🎵 Son : ON':'🔇 Son : OFF'; } }
function toggleSound(){ if(!window.SNKSound) return; SNKSound.unlock(); SNKSound.setEnabled(!SNKSound.isEnabled()); SNKSound.click(); refreshSoundBtn(); }
// Debloque l'audio au premier clic (politique navigateur)
document.addEventListener('click', ()=>{ if(window.SNKSound) SNKSound.unlock(); }, { once:true });
window.addEventListener('load', refreshSoundBtn);

/* ---------- API ---------- */
async function api(path, method='GET', body){
  const opt = { method, headers:{ 'Content-Type':'application/json' } };
  if(TOKEN) opt.headers['Authorization'] = 'Bearer ' + TOKEN;
  if(body) opt.body = JSON.stringify(body);
  const res = await fetch('/api'+path, opt);
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || 'Erreur serveur');
  return data;
}

  if(role==='admin') return '<span class="role-badge admin">🛡️ ADMIN</span>';
  return '';
}

  const box = $('#userbox');

  } else box.innerHTML='';
}
function showMsg(id,txt,ok){ const el=$('#'+id); if(!el)return; el.textContent=txt; el.className='msg '+(ok?'ok':'err'); el.style.display='block'; }

/* ---------- Recuperation de mot de passe (admin/superadmin) ---------- */
let recoverState = { username:'', questions:[] };
function viewRecover(){
  renderHeader();
  screen.innerHTML=`<div class="card">
    <span class="back-link" onclick="viewLogin()">← Retour</span>
    <h2 class="title">Mot de passe <span>oublié</span></h2>
    <p class="subtitle">Répondez à votre question de sécurité pour réinitialiser.</p>
    <div class="msg err" id="rm"></div>
    <label>Nom d'utilisateur du compte</label><input id="ru2" autocomplete="off"/>
    <div class="mt"><button class="btn" onclick="recoverStep1()">Continuer</button></div>
  </div>`;
}
async function recoverStep1(){
  const username=$('#ru2').value.trim();
  try{
    const d=await api('/recover/questions','POST',{username});
    recoverState={ username, questions:d.questions };
    renderHeader();
    screen.innerHTML=`<div class="card"><span class="back-link" onclick="viewRecover()">← Retour</span>
      <h2 class="title">Question(s) de <span>sécurité</span></h2>
      <p class="subtitle">Répondez pour récupérer le compte <b>${esc(username)}</b>.</p>
      <div class="msg err" id="rm"></div>
      ${recoverState.questions.map((q,i)=>`<label>${esc(q)}</label><input id="ra${i}" autocomplete="off"/>`).join('')}
      <label>Nouveau mot de passe</label><input id="rnp" type="password"/>
      <div class="mt"><button class="btn gold" onclick="recoverStep2()">Réinitialiser le mot de passe</button></div>
    </div>`;
  }catch(e){ showMsg('rm', e.message); }
}
async function recoverStep2(){
  const answers=recoverState.questions.map((_,i)=>$('#ra'+i).value);
  const newPassword=$('#rnp').value;
  try{
    await api('/recover/reset','POST',{ username:recoverState.username, answers, newPassword });
    renderHeader();
    screen.innerHTML=`<div class="card center"><h2 class="title">✔ <span>Réinitialisé</span></h2>
      <p class="subtitle">Votre mot de passe a été modifié.</p>
      <div class="mt"><button class="btn" onclick="viewLogin()">Se connecter</button></div></div>`;
  }catch(e){ showMsg('rm', e.message); }
}

async function doLogin(){
  try{
    const remember = $('#lr') ? $('#lr').checked : true;
    const d = await api('/login','POST',{ username:$('#lu').value.trim(), password:$('#lp').value, remember });
    TOKEN=d.token; ME=d.user;
    // 'Se souvenir de moi' : localStorage (persiste) sinon sessionStorage (efface a la fermeture)
    if(remember){ localStorage.setItem('snk_token',TOKEN); sessionStorage.removeItem('snk_token'); }
    else { sessionStorage.setItem('snk_token',TOKEN); localStorage.removeItem('snk_token'); }
    viewDashboard();
  }catch(e){ showMsg('m', e.message); }
}
function viewRegister(){
  renderHeader();
  screen.innerHTML=`
  <div class="card">
    <span class="back-link" onclick="viewLogin()">← Retour</span>
    <h2 class="title">Créer un compte <span>神</span></h2>
    <p class="subtitle">Créez et animez vos propres quiz.</p>
    <div class="msg err" id="m"></div>
    <label>Nom d'utilisateur</label><input id="ru" autocomplete="off"/>
    <label>Mot de passe</label><input id="rp" type="password"/>
    <label>Confirmer le mot de passe</label><input id="rp2" type="password"/>
    <input id="rweb" name="website" tabindex="-1" autocomplete="off" style="position:absolute;left:-9999px;opacity:0" aria-hidden="true"/>
    <div class="mt"><button class="btn" onclick="doRegister()">S'inscrire</button></div>
    <div class="switchlink">Déjà un compte ? <a onclick="viewLogin()">Se connecter</a></div>
  </div>`;
  regFormTs = Date.now(); // anti-bot : horodatage d'affichage du formulaire
}
let regFormTs = 0;
async function doRegister(){
  const p=$('#rp').value, p2=$('#rp2').value;
  if(p!==p2){ showMsg('m','Les mots de passe ne correspondent pas.'); return; }
  try{
    const d = await api('/register','POST',{ username:$('#ru').value.trim(), password:p,
      website: $('#rweb')?$('#rweb').value:'', formTs: regFormTs });
    TOKEN=d.token; localStorage.setItem('snk_token',TOKEN); sessionStorage.removeItem('snk_token'); ME=d.user; viewDashboard();
  }catch(e){ showMsg('m', e.message); }
}
async function logout(){ try{ await api('/logout','POST'); }catch{} if(window.SNKSound){ SNKSound.lobby(false); SNKSound.tickStop(); } TOKEN=null; ME=null; localStorage.removeItem('snk_token'); sessionStorage.removeItem('snk_token'); viewLogin(); }

async function saveSecurityQuestions(){
  const questions=[0,1,2].map(i=>({ question:$('#sq'+i).value.trim(), answer:$('#sa'+i).value.trim() }));
  try{ await api('/security-questions','POST',{questions});
    ME.hasSecurityQuestions=true;
    const m=$('#sqm'); m.className='msg ok'; m.style.display='block'; m.textContent='Questions enregistrées ✔';
    setTimeout(viewDashboard,900);
  }catch(e){ const m=$('#sqm'); m.className='msg err'; m.style.display='block'; m.textContent=e.message; }
}
function viewChangePassword(){
  renderHeader();
  screen.innerHTML=`<div class="card"><span class="back-link" onclick="viewDashboard()">← Retour</span>
    <h2 class="title">Changer le <span>mot de passe</span></h2>

    <label>Nouveau mot de passe</label><input id="cpn" type="password"/>
    <label>Confirmer le nouveau</label><input id="cpn2" type="password"/>
    <div class="mt"><button class="btn gold" onclick="doChangePassword()">Enregistrer</button></div></div>`;
}
async function doChangePassword(){
  const o=$('#cpo').value,n=$('#cpn').value,n2=$('#cpn2').value;
  const m=$('#cpm');
  if(n!==n2){ m.className='msg err';m.style.display='block';m.textContent='Les nouveaux mots de passe ne correspondent pas.'; return; }
  try{ await api('/change-password','POST',{oldPassword:o,newPassword:n});
    m.className='msg ok';m.style.display='block';m.textContent='Mot de passe modifié ✔';
    setTimeout(viewDashboard,900);
  }catch(e){ m.className='msg err';m.style.display='block';m.textContent=e.message; }
}

async function viewMyQuizzes(){

    <button class="btn" onclick="viewEditQuiz()">＋ Créer un nouveau quiz</button>
    <div class="mt" id="qlist">Chargement…</div></div>`;
  try{
    const d = await api('/quizzes');
    const list=$('#qlist');
    if(!d.quizzes.length){ list.innerHTML='<p class="hint center">Aucun quiz. Créez-en un !</p>'; return; }
    list.innerHTML = d.quizzes.map(q=>`
      <div class="quiz-item">
        <div><h4>${esc(q.title)}</h4><p>${q.questions.length} question(s) · ${esc(q.ownerName)} ${q.id==='demo-quiz'?'<span class="pill">DÉMO</span>':''}</p></div>
        <div class="acts">
          <button class="btn gold small" onclick="viewLaunchOptions('${q.id}')">▶ Lancer</button>
          <button class="btn alt small" onclick="viewEditQuiz('${q.id}')">Modifier</button>

/* ---------- Import de medias (compression image + limites) ---------- */
const MAX_IMG_BYTES = 2*1024*1024;    // 2 Mo apres compression
const MAX_AUDIO_BYTES = 6*1024*1024;  // 6 Mo
function readFileAsDataURL(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); }); }
function dataUrlBytes(d){ const i=d.indexOf(','); return Math.floor((d.length-i-1)*3/4); }

async function importImage(i, input){
  const file=input.files[0]; if(!file) return;
  try{
    const dataUrl = await readFileAsDataURL(file);
    const compressed = await compressImage(dataUrl, 1280, 0.82);
    if(dataUrlBytes(compressed) > MAX_IMG_BYTES){
      const more = await compressImage(dataUrl, 1000, 0.7);
      editorState.questions[i].image = more;
    } else {
      editorState.questions[i].image = compressed;
    }
    renderQuestions();
    toast('Image importée ✔');
  }catch(e){ alert('Impossible de lire cette image.'); }
}
function compressImage(dataUrl, maxDim, quality){
  return new Promise((res)=>{
    const img=new Image();
    img.onload=()=>{
      let {width,height}=img;
      if(width>maxDim || height>maxDim){ const r=Math.min(maxDim/width, maxDim/height); width=Math.round(width*r); height=Math.round(height*r); }
      const cv=document.createElement('canvas'); cv.width=width; cv.height=height;
      const ctx=cv.getContext('2d'); ctx.drawImage(img,0,0,width,height);
      res(cv.toDataURL('image/jpeg', quality));
    };
    img.onerror=()=>res(dataUrl);
    img.src=dataUrl;
  });
}
async function importAudio(i, input){
  const file=input.files[0]; if(!file) return;
  if(file.size > MAX_AUDIO_BYTES){ alert('Audio trop volumineux ('+(file.size/1048576).toFixed(1)+' Mo). Maximum '+(MAX_AUDIO_BYTES/1048576)+' Mo.\\nAstuce : raccourcissez le son ou réduisez la qualité.'); input.value=''; return; }
  try{ editorState.questions[i].audio = await readFileAsDataURL(file); renderQuestions(); toast('Audio importé ✔'); }
  catch(e){ alert('Impossible de lire cet audio.'); }
}
function removeMedia(i, kind){ delete editorState.questions[i][kind]; renderQuestions(); }
function syncMeta(){ if($('#qtitle')) editorState.title=$('#qtitle').value; if($('#qdesc')) editorState.description=$('#qdesc').value; }
function addQuestion(t){ syncMeta(); editorState.questions.push(newQuestion(t)); renderQuestions(); }
function delQuestion(i){ editorState.questions.splice(i,1); renderQuestions(); }
function updText(i,v){ editorState.questions[i].text=v; }
function updOpt(i,o,v){ editorState.questions[i].options[o]=v; }
function setCorrect(i,o){ editorState.questions[i].correct=[o]; }
function setTime(i,v){ editorState.questions[i].time=parseInt(v); }
async function saveQuiz(){
  syncMeta(); const s=editorState;
  if(!s.title.trim()){ showMsg('em','Donnez un titre.'); return; }
  for(let i=0;i<s.questions.length;i++){ const q=s.questions[i];
    if(!q.text.trim()){ showMsg('em','La question '+(i+1)+' est vide.'); return; }
    if(q.type==='qcm' && q.options.filter(o=>o.trim()).length<2){ showMsg('em','Question '+(i+1)+' : min 2 réponses.'); return; }
  }
  s.questions.forEach(q=>{ if(q.type==='qcm'){ const keep=[],nc=[];
    q.options.forEach((o,oi)=>{ if(o.trim()){ if(q.correct.includes(oi)) nc.push(keep.length); keep.push(o);} });
    q.options=keep; q.correct=nc.length?nc:[0]; } });
  try{ await api('/quizzes','POST',s); showMsg('em','Quiz enregistré ✔', true); setTimeout(viewMyQuizzes,700); }
  catch(e){ showMsg('em', e.message); }
}

function kamiSay(text, mood){ aiShow(text); if(window.SNKSound && mood==='bad') {} }

function versusQuestion(){
  const q = vs.questions[vs.qi];
  const colors=['a0','a1','a2','a3'], sym=['▲','◆','●','■'];
  if(vs.combo===undefined){ vs.combo=0; }

  screen.innerHTML=`<div class="card wide">
    <span class="back-link" onclick="quitIaGame()">✕ Abandonner</span>
    <div class="vs-wrap">
      <div class="vs-side me ${vs.myScore>=vs.kamiScore?'lead':''}" id="vsMe">

      <div class="vs-mid"><div class="vs-clash" id="vsClash">⚔️</div></div>
      <div class="vs-side kami ${vs.kamiScore>vs.myScore?'lead':''}" id="vsKami">
        <div class="vs-ava" id="kamiAva">🦊</div><div class="vs-name">Kami</div><div class="vs-score" id="kamiScore">${vs.kamiScore}</div>
        <div class="kami-thinking" id="kamiThink"></div></div>
    </div>
    <div class="momentum"><div class="momentum-fill" id="momentumFill"></div><span class="momentum-mid"></span></div>
    <div class="qmeta"><span>Question ${vs.qi+1} / ${vs.questions.length}</span><span><b id="tleft">${q.time}</b>s</span></div>
    <div class="timer-bar"><div class="timer-fill" id="tfill" style="width:100%"></div></div>
    <div class="qbig">${esc(q.text)}</div>
    ${mediaHtml(q, {autoplay:true})}
    <div class="answer-grid">${q.options.map((o,i)=>`<button class="answer-btn ${colors[i]}" id="vopt${i}" onclick="versusAnswer(${i})"><span class="sym">${sym[i]}</span> ${esc(o)}</button>`).join('')}</div>
  </div>`;
  updateMomentum();
  // petite provocation de Kami a la 1ere question et a mi-parcours
  if(vs.qi===0) setTimeout(()=>kamiSay(pickArr(KAMI_TAUNT.start)), 300);
  else if(vs.qi===Math.floor(vs.questions.length/2)){
    const diff=vs.myScore-vs.kamiScore;
    setTimeout(()=>kamiSay(pickArr(Math.abs(diff)<300?KAMI_TAUNT.close : diff>0?KAMI_TAUNT.youLead:KAMI_TAUNT.kamiLead)),300);
  }
  // clash visuel
  const clash=$('#vsClash'); if(clash){ clash.classList.remove('go'); void clash.offsetWidth; clash.classList.add('go'); }
  vs.qStart=Date.now(); vs.answered=false;
  const plan = vs.kamiPlan[vs.qi];
  $('#kamiThink').textContent='réfléchit…';
  if($('#kamiAva')) $('#kamiAva').classList.add('thinking');
  vs.kamiTimeout = setTimeout(()=>{ if(!vs.answered) kamiAnswers(true); }, plan.tResp*1000);
  let t=q.time;
  if(window.SNKSound) SNKSound.tickStart(q.time);
  if(window._vtimer) clearInterval(window._vtimer);
  window._vtimer=setInterval(()=>{ t--; if($('#tleft'))$('#tleft').textContent=Math.max(0,t);
    if($('#tfill'))$('#tfill').style.width=(Math.max(0,t)/q.time*100)+'%';
    if(t<=0){ clearInterval(window._vtimer); if(!vs.answered) versusAnswer(-1); } },1000);
}
function pickArr(a){ return a[Math.floor(Math.random()*a.length)]; }
/* Quitter une partie IA (versus/solo) en cours, avec confirmation */
function quitIaGame(){
  if(!confirm('Abandonner la partie en cours et revenir à l accueil ?')) return;
  if(window._vtimer) clearInterval(window._vtimer);
  if(window._stimer) clearInterval(window._stimer);
  if(vs && vs.kamiTimeout) clearTimeout(vs.kamiTimeout);
  if(window.SNKSound){ SNKSound.tickStop(); SNKSound.lobby(false); }
  vs=null; solo=null;
  viewDashboard();
}
function updateMomentum(){
  const f=$('#momentumFill'); if(!f) return;
  const total=Math.max(1, vs.myScore+vs.kamiScore);
  const myPct = (vs.myScore+vs.kamiScore===0)?50 : Math.round(vs.myScore/total*100);
  f.style.width=myPct+'%';
}
function kamiAnswers(firstToAnswer){
  const plan=vs.kamiPlan[vs.qi]; const q=vs.questions[vs.qi];
  const ratio=Math.max(0,(q.time-plan.tResp)/q.time);
  const pts = plan.correct ? Math.round(500+500*ratio) : 0;
  vs.kamiScore += pts;
  animateScore('kamiScore', vs.kamiScore);
  if($('#kamiAva')){ $('#kamiAva').classList.remove('thinking'); $('#kamiAva').textContent = plan.correct?'😎':'😵'; setTimeout(()=>{ if($('#kamiAva'))$('#kamiAva').textContent='🦊'; },1200); }
  $('#kamiThink').textContent = plan.correct ? `a répondu ✔ (+${pts})` : 'a répondu ✗';
  if(firstToAnswer){ kamiSay(pickArr(plan.correct?KAMI_TAUNT.kamiCorrectFirst:KAMI_TAUNT.kamiWrong)); }
  updateVsLead(); updateMomentum();
}
function versusAnswer(opt){
  if(vs.answered) return; vs.answered=true;
  if(window._vtimer) clearInterval(window._vtimer);
  if(window.SNKSound) SNKSound.tickStop();
  const q=vs.questions[vs.qi];
  const correctIdx = vs.correct[vs.qi];
  const isCorrect = (opt === correctIdx);
  const elapsed=(Date.now()-vs.qStart)/1000;
  const ratio=Math.max(0,(q.time-elapsed)/q.time);
  let pts = isCorrect ? Math.round(500+500*ratio) : 0;
  // gestion du combo
  if(isCorrect){ vs.combo=(vs.combo||0)+1; if(vs.combo>=3){ pts+=200; } vs.myGood++; }
  else { vs.combo=0; }
  if(isCorrect){ vs.myScore+=pts; }
  if(window.SNKSound){ isCorrect ? SNKSound.correct() : SNKSound.wrong(); }
  animateScore('myScore', vs.myScore);
  if(isCorrect && vs.combo>=2){ floatReact('🔥'); }
  document.querySelectorAll('.answer-grid .answer-btn').forEach((b,i)=>{ b.disabled=true;
    if(i===correctIdx) b.classList.add('correct'); else if(i===opt) b.classList.add('wrong'); });
  // Kami repond s'il ne l'a pas deja fait (toi plus rapide que lui)
  let kamiWasFirst = ($('#kamiThink') && $('#kamiThink').textContent!=='réfléchit…');
  if(!kamiWasFirst){ clearTimeout(vs.kamiTimeout); kamiAnswers(false); }
  // reaction de Kami a TA reponse
  setTimeout(()=>{
    if(vs.combo>=3 && isCorrect) kamiSay(pickArr(KAMI_TAUNT.combo));
    else kamiSay(pickArr(isCorrect?KAMI_TAUNT.youCorrect:KAMI_TAUNT.youWrong));
  }, 500);
  updateVsLead(); updateMomentum();
  setTimeout(()=>{ vs.qi++; if(vs.qi>=vs.questions.length) finishVersus(); else versusQuestion(); }, 2000);
}
function updateVsLead(){
  const me=$('#vsMe'), ka=$('#vsKami'); if(!me||!ka) return;
  me.classList.toggle('lead', vs.myScore>=vs.kamiScore);
  ka.classList.toggle('lead', vs.kamiScore>vs.myScore);
}
function animateScore(id,val){ const el=$('#'+id); if(!el) return; el.textContent=val; el.style.transform='scale(1.3)'; el.classList.add('flash'); setTimeout(()=>{el.style.transform='scale(1)'; el.classList.remove('flash');},250); }

    <div class="answer-grid">${q.options.map((o,i)=>`<button class="answer-btn ${colors[i]}" onclick="soloAnswer(${i})"><span class="sym">${sym[i]}</span> ${esc(o)}</button>`).join('')}</div>
  </div>`;
  solo.qStart=Date.now(); solo.answered=false;
  if(hasTimer){ let t=q.time;
    if(window.SNKSound) SNKSound.tickStart(q.time);
    if(window._stimer) clearInterval(window._stimer);
    window._stimer=setInterval(()=>{ t--; if($('#tleft'))$('#tleft').textContent=Math.max(0,t);
      if($('#tfill'))$('#tfill').style.width=(Math.max(0,t)/q.time*100)+'%';
      if(t<=0){ clearInterval(window._stimer); if(!solo.answered) soloAnswer(-1); } },1000);
  }
}
function soloAnswer(opt){
  if(solo.answered) return; solo.answered=true;
  if(window._stimer) clearInterval(window._stimer);
  if(window.SNKSound) SNKSound.tickStop();
  const timeSec=Math.round((Date.now()-solo.qStart)/100)/10;
  solo.answers[solo.qi]={ opt: opt<0?null:opt, timeSec };
  const correctIdx = solo.correct ? solo.correct[solo.qi] : null;
  if(window.SNKSound && correctIdx!=null){ (opt===correctIdx) ? SNKSound.correct() : SNKSound.wrong(); }
  document.querySelectorAll('.answer-grid .answer-btn').forEach((b,i)=>{ b.disabled=true;
    if(correctIdx!=null){ if(i===correctIdx) b.classList.add('correct'); else if(i===opt) b.classList.add('wrong'); } });
  setTimeout(()=>{ solo.qi++; if(solo.qi>=solo.questions.length) finishSolo(); else soloQuestion(); }, correctIdx!=null?1200:500);
}
async function finishSolo(){
  try{
    const d=await api('/ia/solo/finish','POST',{ sessionId:solo.sessionId, answers:solo.answers });

  return divs.map(d=>`<option value="${d.id}" ${d.id===sel?'selected':''}>${(d.emoji||'')+' '+d.name}</option>`).join(''); }
function standingsTable(c, list, div){
  const N=c.promoRelegate||5; const n=list.length;
  return `<table class="standings"><tr><th class="pos">#</th><th>Membre</th><th>Pts</th><th>Score cumulé</th><th>J</th><th>V</th></tr>

      // marques montee/descente (sauf D1 en haut et D3 en bas)
      let zone='';
      if(div>1 && s.rank<=N) zone='zone-up';        // monte
      if(div<3 && s.rank>n-N) zone='zone-down';     // descend
      return `<tr class="${s.rank===1?'top1':s.rank===2?'top2':s.rank===3?'top3':''} ${zone}">
        <td class="pos">${s.rank<=3?['🥇','🥈','🥉'][s.rank-1]:s.rank}${zone==='zone-up'?' ⬆':zone==='zone-down'?' ⬇':''}</td>

        <td class="pts">${s.rankPts}</td><td>${s.totalScore}</td><td>${s.played}</td><td>${s.wins}</td></tr>`;

  </table>`;

let specWs=null, specPin=null;
function spectateRoom(pin){
  if(!/^\d{6}$/.test(pin)){ alert('PIN à 6 chiffres requis.'); return; }
  specPin=pin;
  renderHeader();
  screen.innerHTML=`<div class="card wide"><span class="back-link" onclick="leaveSpectate()">← Quitter</span>
    <h2 class="title">👁️ Mode <span>spectateur</span> <span class="spectator-count" id="specCount">👁️ …</span></h2>
    <div class="spectate-layout">
      <div id="specStage"><p class="hint">Connexion à la partie…</p></div>
      <div class="chat-box">

        <div class="chat-msgs" id="chatMsgs"></div>
        <div class="react-bar" id="reactBar"></div>
        <div class="chat-input"><input id="chatInput" maxlength="200" placeholder="Votre message…" onkeydown="if(event.key==='Enter')sendChat()"/><button class="btn" onclick="sendChat()">Envoyer</button></div>
      </div>
    </div></div>`;
  ['👍','❤️','😂','😮','🔥','👏','😱','🦊'].forEach(e=>{ const b=document.createElement('button'); b.textContent=e; b.onclick=()=>sendReact(e); $('#reactBar').appendChild(b); });
  specWs=new WebSocket(wsUrl());
  specWs.onopen=()=> specWs.send(JSON.stringify({ type:'spectate', pin:specPin, name: ME?ME.username:'Spectateur' }));
  specWs.onmessage=onSpecMessage;
  specWs.onclose=()=>{};
}
function leaveSpectate(){ if(specWs){ try{specWs.close();}catch{} specWs=null; } viewLiveRooms(); }
function specSend(o){ if(specWs && specWs.readyState===1) specWs.send(JSON.stringify(o)); }
function sendChat(){ const i=$('#chatInput'); if(!i||!i.value.trim()) return; specSend({type:'chat',text:i.value.trim()}); i.value=''; }
function sendReact(e){ specSend({type:'react',emoji:e}); }
function onSpecMessage(ev){
  let m; try{ m=JSON.parse(ev.data); }catch{ return; }
  switch(m.type){
    case 'spectate-error': $('#specStage').innerHTML='<p class="msg err" style="display:block">'+esc(m.message)+'</p>'; break;
    case 'spectating':
      if($('#specCount')) $('#specCount').textContent='👁️ '+(m.spectators||1);
      (m.chat||[]).forEach(addChatMsg);
      if(m.state==='question' && m.question) specShowQuestion(m.question);
      else if(m.state==='reveal'||m.state==='ended') specShowLeaderboard(m.leaderboard||[]);
      else specStageMsg(m.state==='lobby'?'⏳ La partie va bientôt commencer…':'En attente…');
      break;
    case 'spectators': if($('#specCount')) $('#specCount').textContent='👁️ '+m.count; break;
    case 'spectate-question': specShowQuestion(m); break;
    case 'spectate-reveal': specShowReveal(m); break;
    case 'spectate-gameover': specShowGameover(m); break;
    case 'chat': addChatMsg(m.entry); break;
    case 'react': floatReact(m.emoji); break;
    case 'ai': addChatMsg({sys:true, text:'🦊 Kami : '+m.text, at:Date.now()}); break;
  }
}
function specStageMsg(t){ const s=$('#specStage'); if(s) s.innerHTML='<div class="big-status">'+esc(t)+'</div>'; }
function specShowQuestion(q){
  const s=$('#specStage'); if(!s) return;
  const colors=['a0','a1','a2','a3'], sym=['▲','◆','●','■'];
  s.innerHTML=`<div class="qmeta"><span>Question ${(q.index!=null?q.index+1:'')} ${q.total?'/ '+q.total:''}</span><span>⏱ ${q.timeLeft!=null?q.timeLeft:q.time}s</span></div>

    <p class="hint center mt">👁️ Vous regardez en spectateur</p>`;
}
function specShowReveal(m){
  const s=$('#specStage'); if(!s) return;

    <table class="standings"><tr><th class="pos">#</th><th>Joueur</th><th>Score</th></tr>
    ${(m.leaderboard||[]).map((p,i)=>`<tr class="${i===0?'top1':''}"><td class="pos">${i+1}</td><td>${mascotHtml(p.mascot,'s')} ${esc(p.name)}</td><td>${p.score}</td></tr>`).join('')}</table>`;
}
function specShowLeaderboard(lb){

function specShowGameover(m){
  const s=$('#specStage'); if(!s) return;

    <table class="standings"><tr><th class="pos">#</th><th>Joueur</th><th>Score</th></tr>

function addChatMsg(e){
  const c=$('#chatMsgs'); if(!c||!e) return;
  const div=document.createElement('div');
  if(e.sys){ div.className='chat-msg sys'; div.textContent=e.text; }
  else { div.className='chat-msg '+(e.kind||'spectator'); div.innerHTML=`<span class="who">${esc(e.from)} :</span> ${esc(e.text)}`; }

}
function floatReact(emoji){
  const el=document.createElement('div'); el.className='float-react'; el.textContent=emoji;
  el.style.left=(40+Math.random()*40)+'%'; el.style.bottom='120px';
  document.body.appendChild(el); setTimeout(()=>el.remove(),2400);

let ws=null, gameQuiz=null, currentPin=null, currentCorrect=null;
function wsUrl(){ const p=location.protocol==='https:'?'wss':'ws'; return p+'://'+location.host; }

let launchOpts = { teamMode:false, teamAssign:'choose' };
let lobbyPlayers = [], roomInfo=null;

let hostIntentionalClose=false, hostReconnectAttempt=0, hostReconnectTimer=null, gameStarted=false;
const HFIB=[1,1,2,3,5,8,13,21];
function hostReconnectDelay(n){ return (HFIB[Math.min(n,HFIB.length-1)]||21)*1000; }
function hostBanner(on, txt){
  let b=document.getElementById('hostReconBanner');
  if(on){ if(!b){ b=document.createElement('div'); b.id='hostReconBanner'; b.className='host-recon-banner'; document.body.appendChild(b); } b.textContent=txt||'Reconnexion…'; b.style.display='block'; }
  else if(b){ b.style.display='none'; }
}
async function hostQuiz(){
  const d=await api('/quizzes'); gameQuiz=d.quizzes.find(q=>q.id===launchOpts.quizId);
  hostIntentionalClose=false; hostReconnectAttempt=0; gameStarted=false;
  const isChamp = $('#isChamp') && $('#isChamp').checked;
  const champDay = isChamp ? parseInt($('#champDayNum').value)||1 : null;
  const champDivision = isChamp ? (parseInt($('#champDivSel').value)||1) : null;
  openHostSocket(()=> ws.send(JSON.stringify({ type:'host-create', token:TOKEN, quizId:launchOpts.quizId,
    teamMode:launchOpts.teamMode, teamAssign:launchOpts.teamAssign, champDay, champDivision })));
}
function openHostSocket(onOpen){
  ws=new WebSocket(wsUrl());
  ws.onopen=()=>{ hostReconnectAttempt=0; if(onOpen) onOpen(); };
  ws.onmessage=onHostMessage;
  ws.onclose=()=>{ if(hostIntentionalClose) return; if(currentPin) scheduleHostReconnect(); };
  ws.onerror=()=>{};
}
function scheduleHostReconnect(){
  const delay=hostReconnectDelay(hostReconnectAttempt);
  hostBanner(true, '⚠️ Connexion perdue — reconnexion ('+Math.round(delay/1000)+'s)…');
  clearTimeout(hostReconnectTimer);
  hostReconnectTimer=setTimeout(()=>{ hostReconnectAttempt++;
    openHostSocket(()=> ws.send(JSON.stringify({ type:'host-rejoin', token:TOKEN, pin:currentPin }))); }, delay);
}
function wsSend(type, extra){ if(ws && ws.readyState===1) ws.send(JSON.stringify({type, token:TOKEN, ...extra})); }

function onHostMessage(ev){
  let m; try{ m=JSON.parse(ev.data); }catch{ return; }
  switch(m.type){
    case 'room-created': currentPin=m.pin; roomInfo=m; viewLobby(m); break;
    case 'players': lobbyPlayers=m.players; updatePlayers(m.players); break;
    case 'game-start': gameStarted=true; prevRanks={}; prevScores={}; if(window.SNKSound) SNKSound.lobby(false); break;
    case 'question': currentCorrect=m.correct; viewHostQuestion(m); break;
    case 'answer-progress': updateProgress(m.answered, m.total); break;
    case 'reveal': viewHostReveal(m); break;
    case 'gameover': viewHostFinal(m); break;
    case 'ai': aiShow(m.text); break;
    case 'mod-ok': toast('Action effectuée ✔'); break;
    case 'mod-error': alert(m.message); break;
    case 'rate-limited': toast('⏳ Trop d\'actions, patientez.'); break;
    case 'rejoin-fail': hostBanner(false); alert(m.message||'Reconnexion impossible.'); leaveGame(); break;
    case 'host-resync': hostBanner(false); handleHostResync(m); break;
    case 'spectators': { const el=$('#lobbySpec')||$('#hostSpecCount'); if(el) el.textContent='👁️ '+m.count; break; }
    case 'chat': hostChatMsg(m.entry); break;
    case 'react': floatReact(m.emoji); break;
    case 'error': alert(m.message); break;
  }
}
function hostChatMsg(e){
  // mini bulle de chat pour l'animateur (coin bas gauche)
  let box=document.getElementById('hostChat');
  if(!box){ box=document.createElement('div'); box.id='hostChat';
    box.style.cssText='position:fixed;left:14px;bottom:14px;z-index:9300;width:280px;max-height:220px;overflow-y:auto;background:rgba(12,12,16,.95);border:1px solid #2c2c2c;border-radius:12px;padding:8px;font-size:12px;';
    document.body.appendChild(box); }
  const d=document.createElement('div'); d.style.marginBottom='4px';
  if(e.sys){ d.style.color='#888'; d.style.fontStyle='italic'; d.textContent=e.text; }
  else { d.innerHTML='<b style="color:'+(e.kind==='player'?'#5aa0ff':'#bbb')+'">'+esc(e.from)+':</b> '+esc(e.text); }
  box.appendChild(d); box.scrollTop=box.scrollHeight;
  clearTimeout(window._hcTimer); window._hcTimer=setTimeout(()=>{ if(box) box.style.opacity='0.4'; }, 8000);
  box.style.opacity='1';
}
function handleHostResync(m){
  roomInfo={ pin:m.pin, title:m.title, questionCount:m.questionCount, teamMode:m.teamMode, teamAssign:m.teamAssign, teams:m.teams, isAdmin:m.isAdmin };
  currentPin=m.pin;
  if(m.state==='lobby'){ lobbyPlayers=m.players||[]; viewLobby(roomInfo); updatePlayers(lobbyPlayers); }
  else if(m.state==='question'){
    currentCorrect=m.correct;
    // reconstruit l'ecran question avec le temps restant exact du serveur
    viewHostQuestion({ index:m.index, total:m.total, question:{ ...m.question, time:m.timeLeft } });
    updateProgress(m.answered, m.connected);
  }
  else if(m.state==='reveal'){ viewHostReveal({ index:m.index, correct:m.correct, counts:m.counts, leaderboard:m.leaderboard, teams:m.teams, isLast:m.isLast }); }
  else if(m.state==='ended'){ viewHostFinal({ leaderboard:m.leaderboard, teams:m.teams, teamMode:m.teamMode }); }
  toast('Reconnecté ✔');
}

let prevRanks = {};      // id -> rang precedent
let prevScores = {};     // id -> score precedent
function viewHostReveal(m){
  if(window._htimer) clearInterval(window._htimer);
  if(window.SNKSound){ SNKSound.tickStop(); SNKSound.reveal(); }
  renderHeader();
  const q=gameQuiz.questions[m.index], colors=['a0','a1','a2','a3'], sym=['▲','◆','●','■'];

  screen.innerHTML=`<div class="card wide">
    <div class="qmeta"><span>Résultat — Question ${m.index+1}</span><span>${gameQuiz.questions.length-m.index-1} restante(s)</span></div>
    <div class="qbig">${esc(q.text)}</div>
    ${q.image?`<div class="game-media"><img src="${q.image}" class="game-img" alt="média"/></div>`:''}
    <div class="answer-grid">${q.options.map((o,i)=>`<button class="answer-btn ${colors[i]} ${m.correct.includes(i)?'correct':'wrong'}" disabled>
      <span class="sym">${sym[i]}</span> ${esc(o)} <span style="margin-left:auto;font-size:14px;">${m.counts[i]} ✓</span></button>`).join('')}</div>
    ${m.teams && m.teams.length?`<h3 class="mt center" style="color:var(--or)">Score des équipes</h3>
      ${m.teams.map(t=>`<div class="team-row"><span class="dot" style="background:${t.color}"></span><b>${t.rank}.</b> ${esc(t.name)}<span class="team-score">${t.score}</span></div>`).join('')}`:''}
    ${lb.length?`<h3 class="mt center" style="color:var(--or)">Classement provisoire</h3>
      <div class="lb-anim" id="lbAnim">${lb.map((p,i)=>{
        const oldRank = prevRanks[p.id];
        const delta = (oldRank==null) ? 0 : (oldRank-(i+1)); // >0 monte, <0 descend
        const arrow = oldRank==null ? '<span class="lb-arrow same">•</span>'
          : (delta>0 ? `<span class="lb-arrow up">▲${delta}</span>`
          : (delta<0 ? `<span class="lb-arrow down">▼${-delta}</span>` : '<span class="lb-arrow same">–</span>'));
        const gained = p.score - (prevScores[p.id]||0);
        return `<div class="lb-row ${i===0?'top1':''} ${delta>0?'moved-up':''}" data-id="${p.id}" data-rank="${i}">
          <div class="lb-rank">${i+1}</div>
          ${arrow}
          <div class="lb-name">${mascotHtml(p.mascot,'s')} <span class="nm">${esc(p.name)}</span></div>
          <div class="lb-score">${p.score}${gained>0?`<span class="delta">+${gained}</span>`:''}</div>
        </div>`;
      }).join('')}</div>`:''}
    <div class="center mt"><button class="btn gold" onclick="wsSend('next')">
      ${m.isLast?'🏁 Voir le classement final':'Question suivante →'}</button></div></div>`;

  // Animation FLIP : place chaque ligne a son ancienne position, puis laisse-la glisser
  animateLeaderboard(lb);

  // Memorise pour la prochaine question
  prevRanks = {}; prevScores = {};
  lb.forEach((p,i)=>{ prevRanks[p.id]=i+1; prevScores[p.id]=p.score; });
}
function animateLeaderboard(lb){
  const cont=document.getElementById('lbAnim'); if(!cont) return;
  const rows=[...cont.querySelectorAll('.lb-row')];
  if(!rows.length) return;
  const rowH = rows[0].getBoundingClientRect().height + 8; // hauteur + marge
  rows.forEach(row=>{
    const id=row.dataset.id; const newIdx=parseInt(row.dataset.rank);
    const oldRank=prevRanks[id];
    if(oldRank!=null){
      const oldIdx=oldRank-1;
      const offset=(oldIdx-newIdx)*rowH;
      if(offset!==0){ row.style.transition='none'; row.style.transform=`translateY(${offset}px)`; }
    } else {
      row.style.transition='none'; row.style.opacity='0'; row.style.transform='translateY(10px)';
    }
  });
  // force reflow puis lance la transition vers la position reelle
  void cont.offsetHeight;
  const anyClimb = rows.some(row=>{ const o=prevRanks[row.dataset.id]; return o!=null && (o-1)>parseInt(row.dataset.rank); });
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
    rows.forEach(row=>{ row.style.transition=''; row.style.transform=''; row.style.opacity='1'; });
    if(anyClimb && window.SNKSound) setTimeout(()=>SNKSound.climb(), 200);
  }); });
}

/* ---------- Confettis (canvas, sans dependance) ---------- */
function launchConfetti(duration){
  let cv=document.getElementById('confetti');
  if(!cv){ cv=document.createElement('canvas'); cv.id='confetti'; document.body.appendChild(cv); }
  const ctx=cv.getContext('2d');
  function resize(){ cv.width=innerWidth; cv.height=innerHeight; }
  resize(); window.addEventListener('resize', resize);
  const colors=['#d11414','#e8c46a','#2b6bd1','#26b34a','#ff2b2b','#ffffff'];
  const N=140;
  const parts=Array.from({length:N},()=>({
    x:Math.random()*cv.width, y:-20-Math.random()*cv.height*0.4,
    r:4+Math.random()*6, c:colors[Math.floor(Math.random()*colors.length)],
    vy:2+Math.random()*4, vx:-2+Math.random()*4, rot:Math.random()*6.28, vr:-0.2+Math.random()*0.4
  }));
  const start=Date.now();
  function frame(){
    ctx.clearRect(0,0,cv.width,cv.height);
    const elapsed=Date.now()-start;
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=0.03;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6); ctx.restore();
    });
    if(elapsed<duration) requestAnimationFrame(frame);
    else { ctx.clearRect(0,0,cv.width,cv.height); }
  }
  frame();
}

        ${s.series.map(d=>`<div class="bar" title="${d.label} : ${d.visits} visites, ${d.uniques} uniques">
          <div class="fill" style="height:${Math.round(d.visits/maxV*100)}%"></div>
          <div class="fill u" style="height:${Math.round(d.uniques/maxV*100)}%"></div>
          <div class="lbl">${d.label}</div></div>`).join('')}
      </div>
      <div class="stat-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-card"><h3>${s.games.byMode.multi}</h3><p>Parties multijoueur</p></div>
        <div class="stat-card"><h3>${s.games.byMode.versus}</h3><p>Versus IA</p></div>
        <div class="stat-card"><h3>${s.games.byMode.solo}</h3><p>Solo entraînement</p></div>
      </div>
      <p class="hint">Total cumulé : ${s.totalVisits} visites · ${s.uniqueVisitorsAllTime} visiteurs distincts · ${s.accounts} compte(s).</p>`;
  }catch(e){ box.innerHTML='<p class="msg err" style="display:block">'+esc(e.message)+'</p>'; }
}
function renderBans(bans){
  const el=$('#banlist'); if(!el) return;
  if(!bans.length){ el.innerHTML='<p class="hint">Aucun banni.</p>'; return; }
  el.innerHTML = bans.map(b=>`<div class="mod-row"><span class="who">🚫 ${esc(b.name)} <span class="hint">${esc(b.reason||'')} · par ${esc(b.by||'?')}</span></span>
    <span class="acts"><button class="btn alt small" onclick="adminUnban('${esc(b.name)}')">Débannir</button></span></div>`).join('');
}
async function adminBan(){
  const name=$('#banname').value.trim(); if(!name) return;
  const reason=prompt('Raison du bannissement ?','Non-respect des règles'); if(reason===null) return;
  try{ const r=await api('/admin/ban','POST',{name,reason}); $('#banname').value=''; renderBans(r.bans); toast('Banni ✔'); }catch(e){ alert(e.message); }
}
async function adminUnban(name){
  try{ const r=await api('/admin/unban','POST',{name}); renderBans(r.bans); toast('Débanni ✔'); }catch(e){ alert(e.message); }
}
async function renderCodeList(){
  try{ const d=await api('/admin/code'); const el=$('#codelist');
    el.innerHTML = d.files.map(f=>`<button class="btn alt small" onclick="viewCode('${f}')">${esc(f)}</button>`).join('');
  }catch(e){}
}
async function viewCode(f){
  try{ const d=await api('/admin/code/file?f='+encodeURIComponent(f));
    $('#codeview').innerHTML = `<p class="hint mt">📄 <b>${esc(f)}</b> (lecture seule)</p><div class="code-view">${esc(d.content)}</div>`;
  }catch(e){ alert(e.message); }
}
async function adminDel(id){ if(!confirm('Supprimer ce compte ?'))return; try{ await api('/admin/users/'+id,'DELETE'); viewAdmin(); }catch(e){ alert(e.message);} }

/* ===================== INIT ===================== */
/* ---------- PWA : service worker + splash + bouton d'installation ---------- */
function hideSplash(){ const s=document.getElementById('splash'); if(s){ s.classList.add('hide'); setTimeout(()=>{ if(s) s.remove(); }, 600); } }
if('serviceWorker' in navigator){ window.addEventListener('load', ()=>{ navigator.serviceWorker.register('/sw.js').catch(()=>{}); }); }
let deferredInstall=null;
window.addEventListener('beforeinstallprompt',(e)=>{ e.preventDefault(); deferredInstall=e;
  let b=document.getElementById('installBtn');
  if(!b){ b=document.createElement('button'); b.id='installBtn'; b.textContent='📲 Installer l\'app'; document.body.appendChild(b);
    b.onclick=async()=>{ b.style.display='none'; if(deferredInstall){ deferredInstall.prompt(); await deferredInstall.userChoice; deferredInstall=null; } }; }
  b.style.display='block';
});
window.addEventListener('appinstalled',()=>{ const b=document.getElementById('installBtn'); if(b) b.style.display='none'; });

/* ---------- Portail de consentement (CGU obligatoire avant l'entree) ---------- */
const CGU_VERSION = '1.0';
function consentGiven(){ try{ return localStorage.getItem('snk_cgu') === CGU_VERSION; }catch{ return false; } }
function requireConsent(){
  return new Promise(resolve=>{
    if(consentGiven()){ resolve(true); return; }
    const g=document.createElement('div'); g.id='cgu-gate';
    g.innerHTML=`<div class="cgu-card">
      <div class="cgu-top"><img src="ak-emblem.png" alt="AK"/>
        <div><h3>Shisnekai <span>no Kami</span></h3><small>神 · CONDITIONS D'UTILISATION & CONFIDENTIALITÉ</small></div></div>
      <div class="cgu-text">${window.SNK_CGU||'<p>Conditions generales.</p>'}</div>
      <div class="cgu-foot">
        <div class="cgu-msg" id="cguMsg"></div>
        <label class="cgu-check"><input type="checkbox" id="cguChk"/>
          <span>J'ai lu et j'accepte sans réserve les Conditions Générales d'Utilisation et la politique de confidentialité, et je certifie avoir au moins 13 ans (ou l'autorisation de mon représentant légal).</span></label>
        <div class="cgu-actions">
          <button class="btn gold" id="cguAccept">✔ J'accepte et j'entre</button>
          <button class="btn alt" id="cguRefuse">Refuser</button>
        </div>
      </div></div>`;
    document.body.appendChild(g);
    const msg=g.querySelector('#cguMsg');
    g.querySelector('#cguAccept').onclick=()=>{
      if(!g.querySelector('#cguChk').checked){
        msg.style.display='block';
        msg.innerHTML="🙏 Pour entrer, il faut d'abord cocher la case d'acceptation. C'est rapide et ça nous protège tous — merci de votre compréhension !";
        return;
      }
      try{ localStorage.setItem('snk_cgu', CGU_VERSION); localStorage.setItem('snk_cgu_at', new Date().toISOString()); }catch{}
      g.remove(); resolve(true);
    };
    g.querySelector('#cguRefuse').onclick=()=>{
      g.querySelector('.cgu-text').innerHTML=`<div style="text-align:center;padding:30px 10px">
        <div style="font-size:46px">🦊</div>
        <h4 style="color:var(--or)">Pas de souci, on vous attend !</h4>
        <p>Sans accepter les Conditions d'Utilisation, on ne peut malheureusement pas vous laisser entrer (c'est une obligation pour protéger tout le monde 🙂).</p>
        <p>Quand vous serez prêt, cochez la case et rejoignez l'aventure Shinsekai no Kami !</p>
        <span class="cgu-link" id="cguBack">← Revenir et accepter</span></div>`;
      g.querySelector('#cguBack').onclick=()=> requireConsentReload();
    };
  });
}
function requireConsentReload(){ const g=document.getElementById('cgu-gate'); if(g) g.remove(); requireConsent().then(()=>{ if(!ME) viewLogin(); }); }

(async function init(){
  await loadMascots();
  // garde le splash visible un court instant (effet de demarrage), puis on l'enleve
  setTimeout(hideSplash, 1400);
  await requireConsent();   // ⚠️ consentement CGU obligatoire AVANT toute entree
  if(TOKEN){ try{ const d=await api('/me'); ME=d.user; viewDashboard(); return; }catch{ TOKEN=null; localStorage.removeItem('snk_token'); sessionStorage.removeItem('snk_token'); } }
  viewLogin();
})();
</script>
